[build]
  command = "npm run build"
  publish = "dist"

# Проксируем /api/* на Render, чтобы:
# - не было mixed content
# - не было CORS
# - фронт всегда работал даже без VITE_API_URL
[[redirects]]
  from = "/api/*"
  to = "https://todayubtcrm.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback: любые фронтовые роуты (например /login) должны отдавать index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
